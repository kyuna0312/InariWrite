name: Bug report
description: Something is broken or incorrect
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search existing issues first.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser (for web), Node version (for CLI), InariWrite commit or version if known.
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Console output, screenshots, or minimal sample Markdown if relevant.
